<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collaborative Trip Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
  <div id="auth-root" class="auth-root"></div>

  <div id="app" class="app" hidden>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__brand">
        <div class="logo-mark" aria-hidden="true">✈</div>
        <div>
          <div class="logo-text">TripSync</div>
          <div class="logo-sub">Collaborative Planner</div>
        </div>
      </div>

      <div class="sidebar__trip">
        <label class="field-label" for="trip-select">Active trip</label>
        <select id="trip-select" class="select select--full" aria-label="Select active trip"></select>
        <button type="button" class="btn btn--ghost btn--sm sidebar__new-trip" id="btn-new-trip-quick">+ New trip</button>
      </div>

      <nav class="sidebar__nav" aria-label="Main navigation">
        <button type="button" class="nav-item is-active" data-section="dashboard">
          <span class="nav-item__icon">◉</span> Dashboard
        </button>
        <button type="button" class="nav-item" data-section="members">
          <span class="nav-item__icon">👥</span> Members
        </button>
        <button type="button" class="nav-item" data-section="itinerary">
          <span class="nav-item__icon">◎</span> Itinerary
        </button>
        <button type="button" class="nav-item" data-section="voting">
          <span class="nav-item__icon">◇</span> Voting
        </button>
        <button type="button" class="nav-item" data-section="rsvp">
          <span class="nav-item__icon">✓</span> RSVP
        </button>
        <button type="button" class="nav-item" data-section="expenses">
          <span class="nav-item__icon">$</span> Expenses
        </button>
        <button type="button" class="nav-item" data-section="chat">
          <span class="nav-item__icon">💬</span> Chat
        </button>
        <button type="button" class="nav-item" data-section="documents">
          <span class="nav-item__icon">📄</span> Documents
        </button>
        <button type="button" class="nav-item" data-section="checklist">
          <span class="nav-item__icon">☑</span> Checklist
        </button>
      </nav>

      <div class="sidebar__footer">
        <div class="user-chip" id="current-user-chip">
          <span class="avatar avatar--sm" id="user-avatar">Y</span>
          <div>
            <div class="user-chip__name" id="user-name">You</div>
            <div class="user-chip__email muted" id="user-email" style="font-size:0.72rem;"></div>
            <div class="user-chip__role" id="user-trip-role">—</div>
          </div>
        </div>
        <button type="button" class="btn btn--ghost btn--sm" id="btn-logout" style="width:100%;margin-top:0.5rem;">Log out</button>
      </div>
    </aside>

    <div class="sidebar-backdrop" id="sidebar-backdrop" aria-hidden="true"></div>

    <main class="main">
      <header class="topbar">
        <button type="button" class="btn btn--icon mobile-only" id="btn-menu" aria-label="Open menu">☰</button>
        <div class="topbar__titles">
          <p class="eyebrow" id="topbar-section">Workspace</p>
          <h1 class="topbar__title" id="topbar-title">Trips Dashboard</h1>
          <p class="muted topbar__session" id="topbar-session" style="margin:0.35rem 0 0;font-size:0.85rem;"></p>
        </div>
        <div class="topbar__actions" id="topbar-actions"></div>
      </header>

      <div class="content" id="view-root"></div>
    </main>
  </div>

  <div id="modal-root" class="modal-root" aria-live="polite"></div>
  <div id="toast-root" class="toast-root"></div>

  <script src="../js/storage.js"></script>
  <script src="../js/permissions.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/trips.js"></script>
  <script src="../js/members.js"></script>
  <script src="../js/rsvp.js"></script>
  <script src="../js/itinerary.js"></script>
  <script src="../js/voting.js"></script>
  <script src="../js/expenses.js"></script>
  <script src="../js/chat.js"></script>
  <script src="../js/documents.js"></script>
  <script src="../js/checklist.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
